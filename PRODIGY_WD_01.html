<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Navigation Menu</title>
    <link rel="stylesheet" href="task1.css" />
  </head>
  <body>
    <!--here nav id is used for creating the navigation links and id makes it unique-->
    <nav id="navbar">
      <div class="logo">PRODIGY</div>
      <!--ul=unordered list and li = list item-->
      <ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#portfolio">Portfolio</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
    <!--section id is used to create a separate section of a webpage. and same for the other section -->
    <section id="home">
      <h1>Interactive Navigation Menu</h1>
      <p>Scroll and hover to see advanced interactions.</p>
    </section>

    <section id="about">
      <h1>About</h1>
    </section>

    <section id="services">
      <h1>Services</h1>
    </section>

    <section id="portfolio">
      <h1>Portfolio</h1>
    </section>

    <section id="contact">
      <h1>Contact</h1>
    </section>

    <script src="task1.js"></script>
  </body>
</html>
